<!DOCTYPE html>
<html lang="en">
  <head>
    <title>FaceAPI Live WebCam Demo</title>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, shrink-to-fit=yes">
    <meta name="application-name" content="FaceAPI">
    <meta name="keywords" content="FaceAPI">
    <meta name="description" content="FaceAPI: AI-powered Face Detection, Description & Recognition for Browser and NodeJS using Tensorflow/JS; Author: Vladimir Mandic <https://github.com/vladmandic>">
    <meta name="msapplication-tooltip" content="FaceAPI: AI-powered Face Detection, Description & Recognition for Browser and NodeJS using Tensorflow/JS; Author: Vladimir Mandic <https://github.com/vladmandic>">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="./webcam.js" type="module"></script>
    <style>
      body { font-family: 'Outfit', sans-serif; background: #0f172a; color: white; margin: 0; overflow: hidden; }
      
      .glass-panel {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      }
      
      .hud-container {
        display: none;
        width: 100%;
        padding: 20px 40px;
        box-sizing: border-box;
        justify-content: space-between;
        align-items: center;
        background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
      }
      
      .stat-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 10px 20px;
        min-width: 100px;
      }
      
      .stat-label { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; font-weight: 600; }
      .stat-value { font-size: 32px; font-weight: 800; color: #f8fafc; }
      
      .target-container {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      
      #target-emoji {
        font-size: 80px;
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      
      .progress-ring {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 120px; height: 120px;
        border-radius: 50%;
        border: 6px solid transparent;
        border-top-color: #38bdf8;
        opacity: 0;
        transition: opacity 0.2s;
      }
      
      .menu-screen {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        pointer-events: auto;
        padding: 50px 60px;
        animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      
      h1 { font-size: 42px; margin: 0 0 10px 0; font-weight: 800; background: -webkit-linear-gradient(45deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      p { font-size: 18px; color: #cbd5e1; margin-bottom: 40px; }
      
      .btn {
        font-size: 20px; font-weight: 800; font-family: 'Outfit', sans-serif;
        padding: 16px 40px; cursor: pointer; border: none; border-radius: 999px;
        background: linear-gradient(90deg, #38bdf8, #818cf8);
        color: white;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
      }
      
      .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(56, 189, 248, 0.6); }
      .btn:active { transform: translateY(1px); }
      
      @keyframes popIn {
        0% { opacity: 0; transform: translate(-50%, -40%) scale(0.9); }
        100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      }
      
      @keyframes pulseMatch {
        0% { transform: scale(1); }
        50% { transform: scale(1.4); }
        100% { transform: scale(1); }
      }
      
      #combo-text {
        position: absolute; right: 20px; top: 100px;
        font-size: 24px; font-weight: 800; color: #f43f5e;
        opacity: 0; transition: opacity 0.3s, transform 0.3s;
        text-shadow: 0 0 10px rgba(244, 63, 94, 0.5);
      }
      
      #flash-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle, rgba(56,189,248,0.2) 0%, rgba(0,0,0,0) 70%);
        pointer-events: none; opacity: 0; z-index: 15;
      }
      
      #countdown-overlay {
        display: none;
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        justify-content: center; align-items: center;
        font-size: 160px; font-weight: 800; z-index: 30;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        animation: pulseMatch 0.8s ease-in-out infinite;
      }
      
      #expression-label {
        font-size: 16px; letter-spacing: 3px; text-transform: uppercase;
        color: #38bdf8; font-weight: 600; margin-top: 4px;
      }
      
      #detected-expression {
        position: absolute; bottom: 30px; left: 50%;
        transform: translateX(-50%);
        font-size: 18px; font-weight: 600; color: #94a3b8;
        background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 999px;
      }
    </style>
  </head>
  <body>
    <div id="flash-overlay"></div>
    <div id="game-ui" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; display: flex; flex-direction: column; align-items: center;">
      <!-- HUD -->
      <div id="hud" class="hud-container">
        <div class="glass-panel stat-box">
          <div class="stat-label">Time</div>
          <div class="stat-value" id="time-left">30</div>
        </div>
        
        <div class="target-container">
          <div class="progress-ring" id="progress-ring"></div>
          <div id="target-emoji">😀</div>
          <div id="expression-label">HAPPY</div>
        </div>
        
        <div class="glass-panel stat-box">
          <div class="stat-label">Score</div>
          <div class="stat-value" id="score">0</div>
        </div>
      </div>
      
      <div id="combo-text">2x COMBO!</div>
      <div id="detected-expression">Waiting for face...</div>

      <!-- Start Screen -->
      <div id="start-screen" class="glass-panel menu-screen">
        <h1>Emoji Arcade</h1>
        <p>Match your facial expression to the emoji!</p>
        <button id="start-btn" class="btn">Start Game</button>
      </div>

      <!-- Game Over Screen -->
      <div id="game-over-screen" class="glass-panel menu-screen" style="display: none;">
        <h1>Time's Up!</h1>
        <p>Final Score: <span id="final-score" style="font-weight: 800; color: white;">0</span></p>
        <button id="restart-btn" class="btn">Play Again</button>
      </div>
    </div>
    <div id="countdown-overlay"></div>
    <video id="video" playsinline class="video"></video>
    <canvas id="canvas" class="canvas" style="position: fixed; top: 0; left: 0; z-index: 10"></canvas>
    <div id="log" style="overflow-y: scroll; height: 16.5rem"></div>
  </body>
</html>
