<!DOCTYPE html>
<html lang="en">
  <head>
    <title>FaceAPI Live WebCam Demo</title>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, shrink-to-fit=yes">
    <meta name="application-name" content="FaceAPI">
    <meta name="keywords" content="FaceAPI">
    <meta name="description" content="FaceAPI: AI-powered Face Detection, Description & Recognition for Browser and NodeJS using Tensorflow/JS; Author: Vladimir Mandic <https://github.com/vladmandic>">
    <meta name="msapplication-tooltip" content="FaceAPI: AI-powered Face Detection, Description & Recognition for Browser and NodeJS using Tensorflow/JS; Author: Vladimir Mandic <https://github.com/vladmandic>">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <script src="./webcam.js" type="module"></script>
  </head>
  <body style="font-family: monospace; background: black; color: white; font-size: 16px; line-height: 22px; margin: 0; overflow: hidden">
    <div id="game-ui" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; display: flex; flex-direction: column; align-items: center;">
      <!-- HUD -->
      <div id="hud" style="display: none; width: 100%; padding: 20px; box-sizing: border-box; justify-content: space-between; font-size: 24px; font-weight: bold; background: rgba(0,0,0,0.5);">
        <div>Time: <span id="time-left">30</span>s</div>
        <div id="target-emoji" style="font-size: 64px;">😀</div>
        <div>Score: <span id="score">0</span></div>
      </div>
      <!-- Start Screen -->
      <div id="start-screen" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: auto; background: rgba(0,0,0,0.8); padding: 40px; border-radius: 10px;">
        <h1 style="font-size: 32px; margin-bottom: 20px;">Expression Recreation Game</h1>
        <p style="margin-bottom: 30px;">Match your facial expression to the emoji!</p>
        <button id="start-btn" style="font-size: 24px; padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: deepskyblue; color: white; font-family: monospace; font-weight: bold;">Start Game</button>
      </div>
      <!-- Game Over Screen -->
      <div id="game-over-screen" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: auto; background: rgba(0,0,0,0.8); padding: 40px; border-radius: 10px;">
        <h1 style="font-size: 48px; margin-bottom: 20px;">Time's Up!</h1>
        <p style="font-size: 24px; margin-bottom: 30px;">Final Score: <span id="final-score">0</span></p>
        <button id="restart-btn" style="font-size: 24px; padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: deepskyblue; color: white; font-family: monospace; font-weight: bold;">Play Again</button>
      </div>
    </div>
    <video id="video" playsinline class="video"></video>
    <canvas id="canvas" class="canvas" style="position: fixed; top: 0; left: 0; z-index: 10"></canvas>
    <div id="log" style="overflow-y: scroll; height: 16.5rem"></div>
  </body>
</html>
